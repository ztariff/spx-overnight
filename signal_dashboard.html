<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPX Overnight Signal Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0a0f; color:#e0e0e0; }
.container { max-width:1000px; margin:0 auto; padding:20px; }
h1 { font-size:24px; font-weight:600; color:#fff; }
h3 { font-size:14px; font-weight:600; color:#888; margin:12px 0 8px; text-transform:uppercase; letter-spacing:0.5px; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.header-left { display:flex; align-items:center; gap:12px; }
.status { padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.status.fetching { background:rgba(96,165,250,0.2); color:#60a5fa; border:1px solid #60a5fa; }
.status.active { background:rgba(74,222,128,0.2); color:#4ade80; border:1px solid #4ade80; animation:pulse 2s infinite; }
.status.nosignal { background:rgba(107,114,128,0.2); color:#6b7280; border:1px solid #6b7280; }
.status.closed { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.4); }
.status.error { background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid #ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.meta { font-size:12px; color:#555; margin-bottom:16px; }
.meta span { margin-right:16px; }
.signal-panel { background:#151520; border:1px solid #2a2a3a; border-radius:12px; padding:24px; margin-bottom:20px; text-align:center; }
.signal-tier { font-size:56px; font-weight:900; margin-bottom:4px; }
.signal-score { font-size:18px; color:#888; margin-bottom:4px; }
.signal-bulls { font-size:14px; color:#666; }
.trade-details { text-align:left; margin-top:16px; background:#0a0a14; border-radius:8px; padding:16px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.detail { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #1e1e2e; }
.dlabel { font-size:12px; color:#888; text-transform:uppercase; }
.dvalue { font-size:14px; font-weight:600; }
.green { color:#4ade80; } .red { color:#ef4444; } .amber { color:#f59e0b; } .blue { color:#60a5fa; }
.gauge-container { background:#151520; border:1px solid #2a2a3a; border-radius:12px; padding:16px; margin-bottom:20px; }
.gauge-track { position:relative; height:40px; background:#0a0a14; border-radius:6px; overflow:hidden; }
.gauge-zone { position:absolute; top:0; height:100%; display:flex; align-items:center; justify-content:center; }
.gauge-zone-label { font-size:10px; font-weight:600; color:#888; text-transform:uppercase; }
.gauge-needle { position:absolute; top:-4px; width:3px; height:48px; background:#fff; border-radius:2px; transform:translateX(-50%); transition:left 0.5s ease; }
.factors-panel { background:#151520; border:1px solid #2a2a3a; border-radius:12px; padding:16px; margin-bottom:20px; }
.factor-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.factor-chip { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.factor-chip.on { background:rgba(74,222,128,0.15); color:#4ade80; border:1px solid rgba(74,222,128,0.3); }
.factor-chip.off { background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); }
.zscore-section { margin-top:12px; }
.zscore-row { display:grid; grid-template-columns:110px 1fr 45px 55px; align-items:center; gap:6px; padding:3px 0; }
.zscore-label { font-size:11px; color:#888; }
.zscore-bar-container { height:10px; background:#0a0a14; border-radius:3px; overflow:hidden; }
.zscore-bar { height:100%; border-radius:3px; transition:width 0.3s; }
.zscore-val { font-size:11px; color:#ccc; text-align:right; font-family:monospace; }
.zscore-contrib { font-size:11px; text-align:right; font-family:monospace; }
.tier-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.tier-card { background:#151520; border:1px solid #2a2a3a; border-radius:12px; padding:16px; }
.tier-card.highlight { border-color:rgba(255,255,255,0.3); background:#1a1a2a; }
.tier-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.tier-card-name { font-size:20px; font-weight:800; }
.tier-card-badge { padding:3px 8px; border-radius:12px; font-size:10px; font-weight:700; text-transform:uppercase; }
.perf-table { width:100%; font-size:12px; border-collapse:collapse; }
.perf-table th { text-align:left; color:#666; font-weight:500; padding:4px 6px; border-bottom:1px solid #2a2a3a; text-transform:uppercase; font-size:10px; }
.perf-table td { padding:4px 6px; border-bottom:1px solid #1a1a2a; }
.perf-table td.num { text-align:right; font-family:monospace; }
.log-panel { background:#151520; border:1px solid #2a2a3a; border-radius:12px; padding:12px; max-height:150px; overflow-y:auto; font-family:monospace; font-size:11px; color:#444; }
.log-panel div { padding:1px 0; }
.log-toggle { cursor:pointer; font-size:12px; color:#555; margin-bottom:4px; }
.log-toggle:hover { color:#888; }
@media (max-width:600px) { .detail-grid { grid-template-columns:1fr; } .tier-cards { grid-template-columns:1fr; } }
</style>
</head>

let liveData = {};
let signal = null;
let refreshTimer = null;
let lastFetchTime = null;
let fetchCount = 0;
let marketOpen = false;

function log(msg) {
    const el = document.getElementById("log");
    const t = new Date().toLocaleTimeString();
    el.innerHTML += `<div>[${t}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
}

function fmt(n) { return (n>=0?"+":"") + "$" + Math.abs(Math.round(n)).toLocaleString(); }

function isMarketOpen() {
    const now = new Date();
    const et = new Date(now.toLocaleString("en-US", {timeZone: "America/New_York"}));
    const day = et.getDay();
    const h = et.getHours();
    const m = et.getMinutes();
    const mins = h * 60 + m;
    // Market hours: Mon-Fri, 9:30 AM - 4:00 PM ET
    if (day === 0 || day === 6) return false;
    if (mins >= 570 && mins <= 960) return true;
    return false;
}

function getMarketStatus() {
    const now = new Date();
    const et = new Date(now.toLocaleString("en-US", {timeZone: "America/New_York"}));
    const day = et.getDay();
    const h = et.getHours();
    const m = et.getMinutes();
    const mins = h * 60 + m;

    if (day === 0 || day === 6) return "closed";
    if (mins < 570) return "premarket";
    if (mins <= 960) return "open";
    return "afterhours";
}

async function fetchAllData() {
    fetchCount++;
    const mktStatus = getMarketStatus();
    log(`Fetch #${fetchCount} | Market: ${mktStatus}`);
    document.getElementById("status").textContent = "Fetching...";
    document.getElementById("status").className = "status fetching";

    const results = {};

    // Fetch all tickers in parallel — use /prev when market is closed to get last trading day
    const usePrev = (mktStatus === "closed" || mktStatus === "premarket");

    const promises = ALL_TICKERS.map(async (ticker) => {
        let data = null;
        if (!usePrev) {
            // Try today's data first
            const today = new Date().toISOString().slice(0,10);
            try {
                const r = await fetch(`${BASE}/v2/aggs/ticker/${ticker}/range/1/day/${today}/${today}?adjusted=true&apiKey=${API_KEY}`);
                const d = await r.json();
                if (d.results && d.results.length > 0) {
                    data = d.results[0];
                    data._source = "today";
                }
            } catch(e) {}
        }
        // Fallback to prev close
        if (!data) {
            try {
                const r2 = await fetch(`${BASE}/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${API_KEY}`);
                const d2 = await r2.json();
                if (d2.results && d2.results.length > 0) {
                    data = d2.results[0];
                    data._source = "prev";
                }
            } catch(e) {}
        }
        results[ticker] = data;
        if (data) log(`${ticker}: $${data.c.toFixed(2)} (${data._source})`);
        else log(`${ticker}: NO DATA`);
    });

    // VIX separately — Polygon uses I:VIX for index tickers
    const VIX_TICKERS = ["I:VIX", "VIX"];
    const vixPromise = (async () => {
        let vixData = null;
        for (const vixTicker of VIX_TICKERS) {
            if (vixData) break;
            if (!usePrev) {
                const today = new Date().toISOString().slice(0,10);
                try {
                    const r = await fetch(`${BASE}/v2/aggs/ticker/${vixTicker}/range/1/day/${today}/${today}?adjusted=true&apiKey=${API_KEY}`);
                    const d = await r.json();
                    if (d.results && d.results.length > 0) {
                        vixData = { c: d.results[0].c, source: `today (${vixTicker})` };
                    }
                } catch(e) {}
            }
            if (!vixData) {
                try {
                    const r2 = await fetch(`${BASE}/v2/aggs/ticker/${vixTicker}/prev?adjusted=true&apiKey=${API_KEY}`);
                    const d2 = await r2.json();
                    if (d2.results && d2.results.length > 0) {
                        vixData = { c: d2.results[0].c, source: `prev (${vixTicker})` };
                    }
                } catch(e) {}
            }
        }
        // Fallback: use last known VIX from embedded history
        if (!vixData) {
            const lastHist = HISTORY.spy_history[HISTORY.spy_history.length - 1];
            if (lastHist && lastHist.vix_close) {
                vixData = { c: lastHist.vix_close, source: "history fallback" };
                log(`VIX API failed, using history: ${lastHist.vix_close} from ${lastHist.date}`);
            }
        }
        results["VIX"] = vixData;
        if (vixData) log(`VIX: ${vixData.c.toFixed(2)} (${vixData.source})`);
        else log("VIX: NO DATA (all sources failed)");
    })();

    await Promise.all([...promises, vixPromise]);

    // Fallback for SPY if API failed — use embedded history
    if (!results["SPY"]) {
        const lastHist = HISTORY.spy_history[HISTORY.spy_history.length - 1];
        if (lastHist) {
            results["SPY"] = { c: lastHist.close, o: lastHist.open, h: lastHist.high, l: lastHist.low, v: lastHist.volume, _source: "history fallback" };
            log(`SPY API failed, using history: $${lastHist.close} from ${lastHist.date}`);
        }
    }

    liveData = results;
    lastFetchTime = new Date();
    marketOpen = (mktStatus === "open" || mktStatus === "afterhours");
    log("All data fetched.");
    computeSignal();
    updateMeta();
}

function updateMeta() {
    const el = document.getElementById("meta");
    const mktStatus = getMarketStatus();
    const mktLabels = { closed: "Market Closed", premarket: "Pre-Market", open: "Market Open", afterhours: "After Hours" };
    const timeStr = lastFetchTime ? lastFetchTime.toLocaleTimeString() : "never";
    const src = liveData["SPY"] ? liveData["SPY"]._source : "?";
    el.innerHTML = `<span>Market: ${mktLabels[mktStatus]}</span><span>Data: ${src === "prev" ? "Prior close" : "Today"}</span><span>Last refresh: ${timeStr}</span><span>Next in ${REFRESH_MS/1000}s</span>`;
}

function computeSignal() {
    const spy = liveData["SPY"];
    const tlt = liveData["TLT"];
    const vix = liveData["VIX"];

    if (!spy || !vix) {
        log("ERROR: Missing SPY or VIX data");
        document.getElementById("status").textContent = "Error";
        document.getElementById("status").className = "status error";
        return;
    }

    const spyHist = HISTORY.spy_history;
    const factorHist = HISTORY.factor_history;

    const spyClose = spy.c;
    const spyHigh = spy.h;
    const spyLow = spy.l;
    const spyVol = spy.v;
    const vixClose = vix.c;

    const prev = spyHist[spyHist.length - 1];
    const prev3 = spyHist[spyHist.length - 3];
    const prev5 = spyHist[spyHist.length - 5];
    const prevVix = prev.vix_close;

    const vix_change_1d = prevVix > 0 ? (vixClose - prevVix) / prevVix : 0;
    const return_3d = (spyClose - prev3.close) / prev3.close;
    let tlt_return = 0;
    if (tlt) { tlt_return = (tlt.c - tlt.o) / tlt.o; }
    const return_5d = (spyClose - prev5.close) / prev5.close;

    const highs = spyHist.map(h => h.high);
    highs.push(spyHigh);
    const high_20d = Math.max(...highs.slice(-20));
    const dist_from_20d_high = (spyClose - high_20d) / spyClose;

    const vols = spyHist.map(h => h.volume);
    const vol_ma20 = vols.slice(-20).reduce((a,b) => a+b, 0) / 20;
    const rel_volume = spyVol / vol_ma20;

    const defReturns = DEFENSIVE.map(t => { const d = liveData[t]; return d ? (d.c - d.o) / d.o : 0; });
    const cycReturns = CYCLICAL.map(t => { const d = liveData[t]; return d ? (d.c - d.o) / d.o : 0; });
    const defAvg = defReturns.reduce((a,b) => a+b, 0) / defReturns.length;
    const cycAvg = cycReturns.reduce((a,b) => a+b, 0) / cycReturns.length;
    const def_vs_cyc = defAvg - cycAvg;

    const prev_close_in_range = prev.high !== prev.low ? (prev.close - prev.low) / (prev.high - prev.low) : 0.5;
    const prev_total_return = prev.total_return || 0;
    const prev_streak = prev.prev_streak || 0;

    const rawFactors = { vix_change_1d, return_3d, tlt_return, return_5d, dist_from_20d_high, rel_volume, def_vs_cyc, prev_close_in_range, prev_total_return, prev_streak };

    // Z-scores (rolling 60-day)
    const factorNames = Object.keys(rawFactors);
    const zScores = {};
    for (const f of factorNames) {
        const vals = factorHist.map(h => h[f]).filter(v => v !== null);
        vals.push(rawFactors[f]);
        const window = vals.slice(-60);
        const mean = window.reduce((a,b) => a+b, 0) / window.length;
        const variance = window.reduce((a,b) => a + (b-mean)*(b-mean), 0) / (window.length - 1);
        const std = Math.sqrt(variance);
        zScores[f + "_z"] = std > 0 ? (rawFactors[f] - mean) / std : 0;
    }

    // Composite
    let composite = 0;
    for (const [k,w] of Object.entries(WEIGHTS)) {
        composite += (zScores[k] || 0) * w;
    }

    // Binary signals
    const signals = {
        sig_vix_drop: vix_change_1d < 0 ? 1 : 0,
        sig_mom_pos: return_3d > 0 ? 1 : 0,
        sig_bonds_sell: tlt_return < 0 ? 1 : 0,
        sig_near_high: dist_from_20d_high > -0.0111 ? 1 : 0,
        sig_low_vol: rel_volume < 0.976 ? 1 : 0,
        sig_cyc_lead: def_vs_cyc < 0 ? 1 : 0,
    };
    const n_bull = Object.values(signals).reduce((a,b) => a+b, 0);

    // Tier
    let score_d = 0;
    for (let i = 0; i < DECILE_BREAKS.length; i++) {
        if (composite > DECILE_BREAKS[i]) score_d = i + 1;
    }
    let score_q = 0;
    for (let i = 0; i < QUINTILE_BREAKS.length; i++) {
        if (composite > QUINTILE_BREAKS[i]) score_q = i + 1;
    }

    let tier = "NO SIGNAL";
    if (score_d === 9) tier = "D10";
    else if (score_q === 4) tier = "Q5";
    else if (score_q === 3) tier = "Q4";
    else if (score_q === 2) tier = "Q3";

    signal = { composite, score_d, score_q, tier, n_bull, signals, rawFactors, zScores, spyClose, vixClose, isSignal: tier !== "NO SIGNAL" };

    log(`COMPOSITE: ${composite.toFixed(4)} | D${score_d+1} Q${score_q+1} | ${n_bull}/6 bull | TIER: ${tier}`);
    renderSignal();
}

function renderSignal() {

    const closedNote = (mktStatus === "closed" || mktStatus === "premarket") ? " (prior close)" : "";

    // Status badge
    const statusEl = document.getElementById("status");
    if (s.isSignal) {
        statusEl.textContent = `${s.tier} ACTIVE`;
        statusEl.className = "status active";
    } else if (mktStatus === "closed" || mktStatus === "premarket") {
        statusEl.textContent = "MARKET CLOSED";
        statusEl.className = "status closed";
    } else {
        statusEl.textContent = "NO SIGNAL";
        statusEl.className = "status nosignal";
    }

    // Main signal panel
    const signalEl = document.getElementById("signal");
    if (s.isSignal) {
        const notional = TIER_SIZING[s.tier] || 10000000;
        const nShares = Math.floor(notional / s.spyClose);
        const nContracts = Math.floor(nShares / 100);
        const putStrike = Math.floor(s.spyClose * 0.97 * 2) / 2;
        signalEl.innerHTML = `
            <div class="signal-tier" style="color:${tierColor}">${s.tier}</div>

                    <div class="detail"><span class="dlabel">Exit</span><span class="dvalue amber">SELL at tomorrow's OPEN</span></div>
                </div>
            </div>`;
    } else {
        signalEl.innerHTML = `
            <div class="signal-tier" style="color:${tierColor}">NO TRADE TONIGHT</div>
            <div class="signal-score">Composite: ${s.composite.toFixed(4)} (D${s.score_d+1} / Q${s.score_q+1})${closedNote}</div>
            <div class="signal-bulls">${s.n_bull}/6 bull signals</div>`;
    }

    // Gauge
    const gaugeEl = document.getElementById("gauge");
    const pct = Math.max(0, Math.min(100, (s.composite + 1.5) / 3.3 * 100));
    const tierZones = [
        { label:"No Signal", end:42, color:"#333" },
        { label:"Q3", end:58, color:"#6b7280" },
        { label:"Q4", end:72, color:"#3b82f6" },
        { label:"Q5", end:85, color:"#8b5cf6" },
        { label:"D10", end:100, color:"#f59e0b" },
    ];
    let ghtml = '<div class="gauge-track">';
    let prevEnd = 0;
    for (const z of tierZones) {
        ghtml += `<div class="gauge-zone" style="left:${prevEnd}%;width:${z.end-prevEnd}%;background:${z.color}20;border-right:1px solid ${z.color}">
            <span class="gauge-zone-label">${z.label}</span></div>`;
        prevEnd = z.end;
    }
    ghtml += `<div class="gauge-needle" style="left:${pct}%"></div></div>`;
    gaugeEl.innerHTML = ghtml;

    // Tier performance cards

    renderFactors();

            </div>
            <table class="perf-table">
                <tr><th>Period</th><th>Trades</th><th>P&L</th><th>Win%</th><th>Avg</th></tr>
                ${perfRow("All Time", p.all_time)}
                ${perfRow("YTD", p.ytd)}
                ${perfRow("30d", p.last_30d)}
                ${perfRow("7d", p.last_7d)}
            </table>
        </div>`;
    }
    el.innerHTML = html;
}

function perfRow(label, d) {
    if (!d || d.trades === 0) return `<tr><td>${label}</td><td class="num">0</td><td class="num">-</td><td class="num">-</td><td class="num">-</td></tr>`;
    const pnlColor = d.pnl >= 0 ? "#4ade80" : "#ef4444";
    return `<tr>
        <td>${label}</td>
        <td class="num">${d.trades}</td>
        <td class="num" style="color:${pnlColor}">${fmt(d.pnl)}</td>
        <td class="num">${d.win_rate}%</td>
        <td class="num" style="color:${d.avg_pnl>=0?'#4ade80':'#ef4444'}">${fmt(d.avg_pnl)}</td>
    </tr>`;
}

function renderFactors() {
    const s = signal;
    const factorEl = document.getElementById("factors");
    const sigNames = {
        sig_vix_drop: "VIX Drop", sig_mom_pos: "3d Momentum +", sig_bonds_sell: "Bonds Selling",
        sig_near_high: "Near 20d High", sig_low_vol: "Low Volume", sig_cyc_lead: "Cyclicals Lead",
    };
    let fhtml = '<div class="factor-grid">';
    for (const [k, label] of Object.entries(sigNames)) {
        const on = s.signals[k];
        fhtml += `<div class="factor-chip ${on?'on':'off'}">${on?'\u2713':'\u2717'} ${label}</div>`;
    }
    fhtml += '</div>';

    fhtml += '<div class="zscore-section"><h3>Factor Z-Scores & Contributions</h3>';
    const zNames = {
        vix_change_1d_z: "VIX Change", return_3d_z: "3d Return", tlt_return_z: "TLT Return",
        return_5d_z: "5d Return", dist_from_20d_high_z: "Dist from High", rel_volume_z: "Rel Volume",
        def_vs_cyc_z: "Def vs Cyc", prev_close_in_range_z: "Prev Close Rng",
        prev_total_return_z: "Prev Return", prev_streak_z: "Prev Streak",
    };
    for (const [k, label] of Object.entries(zNames)) {
        const z = s.zScores[k] || 0;
        const w = WEIGHTS[k] || 0;
        const contribution = z * w;
        const barWidth = Math.min(Math.abs(contribution) * 500, 100);
        const barColor = contribution > 0 ? "#4ade80" : "#ef4444";
        fhtml += `<div class="zscore-row">
            <div class="zscore-label">${label}</div>
            <div class="zscore-bar-container">
                <div class="zscore-bar" style="width:${barWidth}%;background:${barColor}"></div>
            </div>
            <div class="zscore-val">${z.toFixed(2)}</div>
            <div class="zscore-contrib" style="color:${barColor}">${contribution>0?'+':''}${contribution.toFixed(3)}</div>
        </div>`;
    }
    fhtml += '</div>';
    factorEl.innerHTML = fhtml;
}
